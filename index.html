<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Eid Mubarak, My Princess Syakira</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@400;600&family=Quicksand:wght@500;700&family=Dancing+Script:wght@700&display=swap" rel="stylesheet">
</head>
<body>

    <div class="art-bg">
        <div class="stars"></div>
        <div class="crescent-moon"></div>
        <div class="mosque-silhouette"></div>
        <div class="royal-couple"></div>
        <div class="lanterns">
            <div class="lantern l1"></div>
            <div class="lantern l2"></div>
        </div>
    </div>

    <div class="floating-memories">
        <div class="polaroid p1"><img src="1.jpeg"></div>
        <div class="polaroid p2"><img src="2.jpeg"></div>
        <div class="polaroid p3"><img src="3.jpeg"></div>
        <div class="polaroid p4"><img src="4.jpeg"></div>
        <div class="polaroid p5"><img src="5.jpeg"></div>
        <div class="polaroid p6"><img src="6.jpeg"></div>
        <div class="polaroid p7"><img src="7.jpeg"></div>
        <div class="polaroid p8"><img src="8.jpeg"></div>
        <div class="polaroid p9"><img src="9.jpeg"></div>
        <div class="polaroid p10"><img src="10.jpeg"></div>
    </div>

    <div class="container">
        <header>
            <h1 class="ied-title">Happy Ied Mubarak</h1>
            <p class="subtitle">Untuk Tuan Putriku, Syakira Nazla</p>
        </header>

        <div class="main-photo-wrapper">
            <div class="frame">
                <img src="main kirun.jpeg" alt="Main Photo">
            </div>
            <div class="ketupat-ornament"></div>
        </div>

        <div class="apology-container">
            <h3 class="list-header">Maaf ya Bebeee...</h3>
            <div id="apologyList" class="list-wrapper">
                </div>
        </div>

        <div class="love-footer">
            <h2 class="giant-text">I LOVE U</h2>
            <p class="forever">Selamanya dan Seterusnya</p>
        </div>
    </div>

    <div class="music-box">
        <button id="playBtn" class="play-trigger">▶</button>
        <div class="track-info">
            <span class="track-name">tengtengteng ✨</span>
            <div class="progress-bar">
                <div id="progressFill" class="fill"></div>
            </div>
        </div>
        <audio id="myAudio" src="Eid Happy Joyful (Free Music).mp3"></audio>
    </div>

    <script src="script.js"></script>
</body>
</html>
